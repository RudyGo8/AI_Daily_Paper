<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 日报</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #5a5a7a;
      --text-muted: #9090a8;
      --border: #e8eaf0;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.08);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a3e 0%, #2d3561 30%, #4a3f8a 70%, #6c5ce7 100%);
      color: #fff;
      padding: 48px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 60%, rgba(255,255,255,.06) 0%, transparent 60%),
                  radial-gradient(circle at 70% 30%, rgba(162,155,254,.08) 0%, transparent 50%);
    }
    .header-content { position: relative; z-index: 1; }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.2);
      padding: 4px 18px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .header .meta {
      font-size: 15px;
      opacity: .75;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header .meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* Main */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 64px;
    }

    /* Intro */
    .intro-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin: 0 10% 28px 10%;
      box-shadow: var(--shadow);
      border-left: 4px solid #6c5ce7;
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.9;
    }

    /* Category */
    .category-section {
      margin-bottom: 32px;
    }
    .category-title {
      font-size: 19px;
      font-weight: 700;
      margin: 0 10% 16px 10%;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .category-count {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Grid — 双栏：左右 10% 留白，卡片间距 5% */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 5%;
      margin: 0 10%;
    }
    .category-grid .news-card:only-child {
      grid-column: 1 / -1;
    }

    /* Card */
    .news-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .2s;
      position: relative;
    }
    .news-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }
    .news-card .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .news-card .card-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 22px;
      padding-top: 3px;
    }
    .news-card .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
    }
    .news-card .card-title a {
      color: inherit;
      text-decoration: none;
      transition: color .15s;
    }
    .news-card .card-title a:hover {
      color: #6c5ce7;
    }
    .news-card .card-summary {
      font-size: 14.5px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 10px;
      padding-left: 34px;
    }
    .news-card .card-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 34px;
      flex-wrap: wrap;
    }
    .news-card .card-source {
      font-size: 12px;
      color: var(--text-muted);
      background: #f5f5fa;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .news-card .card-keywords {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .news-card .card-keywords .tag {
      font-size: 11px;
      color: #6c5ce7;
      background: #f0edff;
      padding: 1px 8px;
      border-radius: 8px;
    }
    .news-card .card-link-icon {
      margin-left: auto;
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      opacity: .5;
      transition: opacity .15s;
    }
    .news-card .card-link-icon:hover { opacity: 1; }

    /* Closing */
    .closing-card {
      background: linear-gradient(135deg, #fafaff, #f5f3ff);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin: 0 10% 32px 10%;
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      box-shadow: var(--shadow);
      border: 1px solid #e8e0ff;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Loading & Empty */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e8eaf0;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 36px 16px 28px; }
      .container { padding: 16px 14px 48px; }
      .intro-card, .category-title, .category-grid, .closing-card { margin-left: 0; margin-right: 0; }
      .category-grid { grid-template-columns: 1fr; gap: 10px; }
      .news-card { padding: 16px 18px; }
      .news-card .card-summary,
      .news-card .card-footer { padding-left: 28px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div v-if="loading" class="loading">
      <div class="spinner"></div>
      <p>加载日报中…</p>
    </div>

    <!-- Error -->
    <div v-else-if="error" class="empty">
      <p style="font-size:32px;margin-bottom:12px;">&#128533;</p>
      <p>加载失败：{{ error }}</p>
    </div>

    <!-- Empty -->
    <div v-else-if="!data" class="empty">
      <p style="font-size:48px;margin-bottom:16px;">&#128240;</p>
      <p>日报数据暂无，请稍后再来。</p>
    </div>

    <!-- Content -->
    <template v-else>
      <!-- Header -->
      <div class="header">
        <div class="header-content">
          <div class="header-badge">AI DAILY BRIEF</div>
          <h1>{{ data.title }}</h1>
          <div class="meta">
            <span>&#128197; {{ data.target_date }}</span>
            <span>&#128214; {{ data.total_items }} 条重点动态</span>
          </div>
        </div>
      </div>

      <div class="container">
        <!-- Intro -->
        <div class="intro-card" v-if="data.intro">{{ data.intro }}</div>

        <!-- Categories -->
        <div v-for="(items, category) in data.categories" :key="category" class="category-section">
          <div class="category-title">
            <span class="category-dot" :style="{ background: catColor(category, 0) }"></span>
            {{ category }}
            <span class="category-count">{{ items.length }} 条</span>
          </div>

          <div class="category-grid">
            <div v-for="(item, idx) in items" :key="idx" class="news-card">
              <div class="card-header">
                <span class="card-num">{{ catColor(category, 1) ? '●' : '○' }}</span>
                <span class="card-title">
                  <a :href="item.link" target="_blank" rel="noopener">{{ item.title }}</a>
                </span>
              </div>
              <div class="card-summary">{{ item.ai_summary || item.summary }}</div>
              <div class="card-footer">
                <span class="card-source">{{ item.source }}</span>
                <span v-if="item.merged_sources && item.merged_sources.length > 1" class="card-source" style="opacity:.65">
                  +{{ item.merged_sources.length - 1 }} 来源
                </span>
                <span class="card-keywords">
                  <span v-for="kw in (item.keywords || []).slice(0,4)" :key="kw" class="tag">{{ kw }}</span>
                </span>
                <a :href="item.link" target="_blank" rel="noopener" class="card-link-icon" :title="item.link">&#8599;</a>
              </div>
            </div>
          </div>
        </div>

        <!-- Closing -->
        <div class="closing-card" v-if="data.closing">{{ data.closing }}</div>

        <!-- Footer -->
        <div class="footer">
          <p>由 AI 自动生成 · 每日更新</p>
          <p style="margin-top:4px;opacity:.6;">AI Daily Brief · {{ data.target_date }}</p>
        </div>
      </div>
    </template>
  </div>

  <script>
    const CATEGORY_COLORS = {
      '模型发布': ['#e17055', '#d63031'],
      '产品动态': ['#00b894', '#00cec9'],
      '研究进展': ['#6c5ce7', '#a29bfe'],
      '工具框架': ['#0984e3', '#74b9ff'],
      '融资并购': ['#fdcb6e', '#e17055'],
      '行业事件': ['#636e72', '#b2bec3'],
    };

    const { createApp } = Vue;

    createApp({
      data() {
        return {
          data: null,
          loading: true,
          error: null,
        };
      },
      async mounted() {
        try {
          const res = await fetch('data.json');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          this.data = await res.json();
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      },
      methods: {
        catColor(category, idx) {
          const c = CATEGORY_COLORS[category];
          if (!c) return '#636e72';
          return c[idx] || c[0];
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
